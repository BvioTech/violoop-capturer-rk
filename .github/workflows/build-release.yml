name: Build binary and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download and setup toolchain for aarch64-none-linux-gnu
        env:
          TOOLCHAIN_REPO: BvioTech/violoop-builder
          TOOLCHAIN_TAG: v0.0.1
        run: |
          wget https://github.com/$TOOLCHAIN_REPO/releases/download/$TOOLCHAIN_TAG/aarch64-none-linux-gnu.tar.gz
          sudo mkdir -p /workspace
          sudo tar -xzf aarch64-none-linux-gnu.tar.gz -C /workspace

      - name: Build for aarch64-none-linux-gnu
        run: |
          ./scripts/build_1.sh
          tar -czf aarch64-none-linux-gnu-capture.tar.gz -C dist capture
          sha256sum aarch64-none-linux-gnu-capture.tar.gz > aarch64-none-linux-gnu-capture.tar.gz.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-files
          path: |
            aarch64-none-linux-gnu-capture.tar.gz
            aarch64-none-linux-gnu-capture.tar.gz.sha256
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-files
          path: .

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            aarch64-none-linux-gnu-capture.tar.gz
            aarch64-none-linux-gnu-capture.tar.gz.sha256
